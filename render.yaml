databases:
  - name: shulesoft-db
    databaseName: examdb
    plan: free

services:
  - type: web
    name: shulesoft-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start
    envVars:
      # Wired automatically to the database block above
      - key: DATABASE_URL
        fromDatabase:
          name: shulesoft-db
          property: connectionString

      # Render auto-generates these secure random values on first deploy
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

      # Static config values
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: ALLOWED_SCHOOL_EMAIL_DOMAINS
        value: school.ac.ke

      # You must fill these in yourself (in the Render dashboard, or edit
      # here before first commit) — sync:false means Render will prompt you
      # for a value instead of guessing one
      - key: FRONTEND_URL
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
